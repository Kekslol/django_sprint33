{% extends 'base.html' %}

{% block title %}Блогикум - Главная{% endblock %}

{% block content %}
  <h1>Последние публикации</h1>
  {% for post in posts %}
    <article>
      <h2>{{ post.location }}</h2>
      <p><i>{{ post.date }}</i></p>
      <p>{{ post.text|truncatewords:30 }}</p>
      <a href="{% url 'blog:post_detail' post.id %}">Подробнее</a>
    </article>
    <hr>
  {% endfor %}
{% endblock %}
